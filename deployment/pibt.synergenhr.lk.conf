# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pibt.synergenhr.lk;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pibt.synergenhr.lk;

    ssl_certificate /etc/letsencrypt/live/pibt.synergenhr.lk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pibt.synergenhr.lk/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 100M;

    location / {
        proxy_pass http://localhost:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /static/ {
        alias /opt/synergenhr-pibt/staticfiles/;
        expires 30d;
    }

    location /media/ {
        alias /opt/synergenhr-pibt/media/;
        expires 30d;
    }
}
