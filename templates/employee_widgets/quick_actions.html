{% load i18n static horillafilters %}
<div class="oh-card-dashboard oh-card-dashboard--no-scale oh-card-dashboard--transparent mb-3">
    <div class="oh-card-dashboard__header oh-card-dashboard__header--divider" style="padding-bottom: 8px;">
        <span class="oh-card-dashboard__title">{% trans "Quick Actions" %}</span>
    </div>
    <div class="oh-card-dashboard__body" style="padding: 12px 8px;">
        <div class="d-flex flex-wrap justify-content-around" style="gap: 8px;">

            {% if "leave"|app_installed %}
            <button type="button"
               data-toggle="oh-modal-toggle"
               data-target="#objectCreateModal"
               hx-get="{% url 'leave-request-create' %}"
               hx-target="#objectCreateModalTarget"
               style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
                      flex:1;min-width:60px;max-width:85px;padding:10px 4px;border-radius:12px;
                      background:#f0f4ff;border:1px solid #c7d2fe;"
               onmouseover="this.style.background='#e0e7ff'" onmouseout="this.style.background='#f0f4ff'">
                <span style="width:38px;height:38px;border-radius:50%;background:#0a0a5a;display:flex;align-items:center;justify-content:center;">
                    <span class="material-symbols-outlined" style="font-size:1.1rem;color:#dbf30d;">calendar_add_on</span>
                </span>
                <span style="font-size:0.65rem;font-weight:600;color:#0a0a5a;text-align:center;line-height:1.2;">{% trans "Request Leave" %}</span>
            </button>
            {% endif %}

            {% if "payroll"|app_installed %}
            <a href="/payroll/view-payslip/"
               style="text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:6px;
                      flex:1;min-width:60px;max-width:85px;padding:10px 4px;border-radius:12px;
                      background:#f0f4ff;border:1px solid #c7d2fe;"
               onmouseover="this.style.background='#e0e7ff'" onmouseout="this.style.background='#f0f4ff'">
                <span style="width:38px;height:38px;border-radius:50%;background:#0a0a5a;display:flex;align-items:center;justify-content:center;">
                    <i class="material-icons" style="font-size:1.1rem;color:#dbf30d;">paid</i>
                </span>
                <span style="font-size:0.65rem;font-weight:600;color:#0a0a5a;text-align:center;line-height:1.2;">{% trans "My Payslips" %}</span>
            </a>
            {% endif %}

            {% if "attendance"|app_installed %}
            <button type="button"
               data-toggle="oh-modal-toggle"
               data-target="#objectCreateModal"
               hx-get="{% url 'request-new-attendance' %}"
               hx-target="#objectCreateModalTarget"
               style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
                      flex:1;min-width:60px;max-width:85px;padding:10px 4px;border-radius:12px;
                      background:#f0f4ff;border:1px solid #c7d2fe;"
               onmouseover="this.style.background='#e0e7ff'" onmouseout="this.style.background='#f0f4ff'">
                <span style="width:38px;height:38px;border-radius:50%;background:#0a0a5a;display:flex;align-items:center;justify-content:center;">
                    <i class="material-icons" style="font-size:1.1rem;color:#dbf30d;">fingerprint</i>
                </span>
                <span style="font-size:0.65rem;font-weight:600;color:#0a0a5a;text-align:center;line-height:1.2;">{% trans "Attendance" %}</span>
            </button>
            {% endif %}

            {% if "asset"|app_installed %}
            <button type="button"
               data-toggle="oh-modal-toggle"
               data-target="#objectCreateModal"
               hx-get="{% url 'asset-request-creation' %}"
               hx-target="#objectCreateModalTarget"
               style="background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
                      flex:1;min-width:60px;max-width:85px;padding:10px 4px;border-radius:12px;
                      background:#f0f4ff;border:1px solid #c7d2fe;"
               onmouseover="this.style.background='#e0e7ff'" onmouseout="this.style.background='#f0f4ff'">
                <span style="width:38px;height:38px;border-radius:50%;background:#0a0a5a;display:flex;align-items:center;justify-content:center;">
                    <i class="material-icons" style="font-size:1.1rem;color:#dbf30d;">devices</i>
                </span>
                <span style="font-size:0.65rem;font-weight:600;color:#0a0a5a;text-align:center;line-height:1.2;">{% trans "My Assets" %}</span>
            </button>
            {% endif %}

        </div>
    </div>
</div>
